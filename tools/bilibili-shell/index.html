<!doctype html>
<!--
  Deploy-once redirect shell for the trusted zh-CN share path on bilibili
  (e.g. https://www.bilibili.com/toy/Manosaba_WitchfactorTest/index.html).
  See README.md next to this file. The ONLY reason to ever redeploy this
  file is a change of SITE below — content releases never touch it.
-->
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="referrer" content="no-referrer">
<meta name="robots" content="noindex">
<title>魔女因子检测</title>
<noscript><meta http-equiv="refresh" content="0; url=https://manosaba-witch-exam.asachiri.com/"></noscript>
<style>
  html, body { margin: 0; height: 100%; background: #0d0b10; color: #b7a98e; font: 15px/1.8 system-ui, sans-serif; }
  body { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.8em; text-align: center; padding: 1.5rem; }
  a { color: #c9954a; }
</style>
</head>
<body>
<p>正在前往检测……</p>
<p><a id="go" href="https://manosaba-witch-exam.asachiri.com/">若未自动跳转，请点击这里</a></p>
<script>
  // TODO(owner): set to the final canonical origin before uploading (keep in
  // step with PUBLIC_SITE_URL). The <noscript> URL above too.
  var SITE = 'https://manosaba-witch-exam.asachiri.com'
  // `?r=<tag>` deep-links to the shared card's page; anything else (or a tag
  // this regex rejects) falls back to the zh-CN exam entry.
  var r = new URLSearchParams(location.search).get('r') || ''
  var target = /^[A-Za-z]{1,6}-\d{1,3}_[A-Za-z]{1,6}-\d{1,3}$/.test(r)
    ? SITE + '/r/' + encodeURIComponent(r) + '/'
    : SITE + '/'
  document.getElementById('go').href = target
  location.replace(target)
</script>
</body>
</html>
